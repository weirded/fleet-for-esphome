name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # 1. Tests — pytest with xdist for parallel execution. ~1 min.
  # ---------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          # Install esphome FIRST in its own pip pass. esphome pins
          # several transitive deps with `==` (notably aioesphomeapi).
          # If we list aioesphomeapi alongside esphome unconstrained,
          # pip resolves aioesphomeapi to the latest release first, then
          # has to backtrack through every esphome version trying to find
          # one that accepts it — eventually reaching ancient esphome
          # releases that pin PyYAML==6.0 (sdist-only, fails to build
          # under Python 3.12 / modern Cython). With esphome installed
          # first, its strict pins win; the second pass sees the deps
          # already satisfied and doesn't upgrade them.
          pip install esphome
          pip install \
            pytest pytest-asyncio pytest-cov pytest-xdist pytest-socket \
            # icmplib is a real server dep (requirements.txt: icmplib>=3.0.4)
            # used by the /ui/api ping handler. It USED to arrive transitively
            # via esphome, but esphome 2026.7.0 dropped it — without an explicit
            # install the test_device_poller MagicMock stub for icmplib activates
            # and test_ui_api's ping test breaks (except <MagicMock> is not a
            # valid exception class). Install it explicitly, matching production.
            aiohttp aioesphomeapi zeroconf icmplib \
            requests psutil pydantic croniter apscheduler
          # The HA integration tests (tests/test_integration_*.py) need
          # the `homeassistant` package installed to import
          # HomeAssistantError, DeviceInfo, etc. Its dep pins conflict
          # with esphome's (voluptuous 0.15 vs 0.16) so we can't install
          # both into the same env without breaking one. Install HA into
          # an isolated prefix that the integration tests can load
          # without contaminating esphome's site-packages.
          python -m venv .ha-testenv
          # Integration tests reach into homeassistant.components.zeroconf
          # via config_flow, so zeroconf + aiohttp need to be present
          # alongside homeassistant itself. IT.2: also installs
          # pytest-homeassistant-custom-component so the non-`_logic`
          # integration tests can use the real ``hass`` fixture.
          ./.ha-testenv/bin/pip install \
            'homeassistant>=2025.1,<2025.2' \
            pytest pytest-asyncio \
            pytest-homeassistant-custom-component \
            aiohttp zeroconf voluptuous

      - name: Run server + client tests
        # Excludes ALL tests/test_integration_*.py — they transitively
        # import `homeassistant.*` (via esphome_fleet modules) and that
        # dep conflicts with esphome in the same env. Both the `_logic`
        # helper tests and any real-hass-fixture tests land in the
        # isolated .ha-testenv in the next step.
        run: |
          pytest tests/ -n auto -v \
            --cov=ha-addon/server --cov=ha-addon/client \
            --cov-report=term-missing --cov-report=html \
            --ignore-glob='tests/test_integration_*.py'

      - name: Run HA integration tests (isolated venv)
        # Runs every ``tests/test_integration_*.py`` (both the `_logic`
        # helper files and the real-hass-fixture files) against the
        # isolated env where `homeassistant` and
        # `pytest-homeassistant-custom-component` are installed. The
        # PY-10 invariant (checked in the `lint` job) enforces that
        # non-`_logic` files import the real-hass plugin.
        run: ./.ha-testenv/bin/pytest tests/test_integration_*.py -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14

  # ---------------------------------------------------------------
  # 2. Lint — ruff + mypy + invariants. Fast (~20s), no heavy deps.
  # ---------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install lint tools
        run: pip install ruff mypy types-requests types-PyYAML

      - name: Ruff lint
        run: ruff check ha-addon/server/ ha-addon/client/

      - name: CLAUDE.md invariants (grep-based linter)
        run: bash scripts/check-invariants.sh

      - name: mypy — server
        run: mypy ha-addon/server/ --ignore-missing-imports

      - name: mypy — client
        run: mypy ha-addon/client/ --ignore-missing-imports

  # ---------------------------------------------------------------
  # 3. Audit — pip-audit on lockfiles. No app deps needed.
  # ---------------------------------------------------------------
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: "pip"

      # Run server + client lockfiles in SEPARATE invocations — they're
      # installed into independent Docker images, so there's no requirement
      # that their transitive dep versions agree.
      - name: pip-audit (server lockfile)
        run: |
          pip install pip-audit
          pip-audit --requirement ha-addon/server/requirements.lock \
            --ignore-vuln CVE-2026-34073 \
            --ignore-vuln CVE-2026-39892 \
            --ignore-vuln CVE-2026-25645 \
            --ignore-vuln CVE-2026-40192
          # ^^^ Pinned by ESPHome's transitive dep bounds — can't upgrade
          # until ESPHome releases with relaxed constraints.
          #
          # Applicability assessment (2026-04-13):
          #   CVE-2026-34073 (cryptography — DNS name constraint bypass):
          #     NOT APPLICABLE. Transitive dep only; server↔worker comms
          #     use HTTP, not HTTPS. Certificate validation never runs.
          #   CVE-2026-39892 (cryptography — buffer overflow via non-contiguous buffers):
          #     LOW RISK. Transitive dep; our code never passes custom buffers
          #     to cryptographic APIs. Only theoretical path is Noise PSK in
          #     aioesphomeapi, but buffer management is internal to the library.
          #   CVE-2026-25645 (requests — predictable temp file in extract_zipped_paths):
          #     NOT APPLICABLE. We never call extract_zipped_paths(); only
          #     standard requests.get()/post() usage in client.py.
          #   CVE-2026-40192 (pillow — image decoder issues, fix in 12.2.0):
          #     NOT APPLICABLE. Pillow is a transitive dep of esphome, used
          #     internally during YAML compilation for font/glyph rendering
          #     (icon embedding, display layouts). The server/worker NEVER
          #     accept user-uploaded images — only YAML configs. Pinned by
          #     esphome==2026.3.3 to ==12.1.1; track upstream for relaxed bound.

      - name: pip-audit (client lockfile)
        run: pip-audit --requirement ha-addon/client/requirements.lock

  # ---------------------------------------------------------------
  # 4. Frontend — npm ci, audit, build, Playwright.
  # ---------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ha-addon/ui/package-lock.json

      - name: Install dependencies
        working-directory: ha-addon/ui
        # --legacy-peer-deps: eslint-plugin-react-hooks@7.0.1 declares
        # peer eslint@^9, but we're on eslint@10. The plugin works fine
        # at runtime; a compatible release will come when React updates it.
        run: npm ci --legacy-peer-deps

      - name: npm audit (frontend)
        working-directory: ha-addon/ui
        run: npm audit --audit-level=high --omit=dev

      - name: Build frontend
        working-directory: ha-addon/ui
        run: npm run build

      # Cache Playwright browsers so we don't re-download ~130 MB on
      # every run. Key includes the Playwright version from package-lock.
      - name: Get Playwright version
        id: pw-version
        working-directory: ha-addon/ui
        run: echo "version=$(npx playwright --version)" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        working-directory: ha-addon/ui
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: ha-addon/ui
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: ha-addon/ui/test-results/
          retention-days: 14
