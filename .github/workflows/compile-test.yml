name: ESPHome Compile Tests

on:
  push:
    branches: [develop, main]
    paths:
      - "ha-addon/client/**"
      - "ha-addon/Dockerfile"
      - "ha-addon/build.yaml"
      - "ha-addon/server/requirements.txt"
      - "tests/fixtures/compile_targets/**"
      - ".github/workflows/compile-test.yml"
  pull_request:
    paths:
      - "ha-addon/client/**"
      - "ha-addon/Dockerfile"
      - "ha-addon/build.yaml"
      - "tests/fixtures/compile_targets/**"
  workflow_dispatch: # manual trigger

concurrency:
  group: compile-${{ github.ref }}
  cancel-in-progress: true

# CI.3 — ESPHome version axis. The pinned floor (`2026.4.0`) is the
# release `BD.2` declared as required by ConfigBundleCreator; the
# `latest_stable` axis tracks the version we ship with — bumped per
# release. Upstream API regressions (the "2026.4.0 reshaped the API"
# class of bug from 1.5) land as a CI red on the `latest_stable` axis
# while the pinned axis anchors reproducibility.
#
# Keep `MIN_ESPHOME_VERSION` in `ha-addon/server/constants.py` in sync
# with the pinned-floor axis — the runtime install path enforces the
# same floor.

jobs:
  # Test the client Docker image (used by remote workers)
  compile-client:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        esphome_version:
          - "2026.4.0"  # pinned floor — `MIN_ESPHOME_VERSION`
          - "2026.7.0"  # latest stable shipped (bump per release) — regression guard for #240 (py3.12 floor)
        target:
          - esp8266-arduino
          - esp32-arduino
          - esp32-idf
          - esp32s2-idf
          - esp32s3-idf
          - esp32c3-idf
          - esp32c6-idf
          - rp2040-arduino
          - bk72xx-libretiny
          - rtl87xx-libretiny
          - esp32c3-external-components
          - esp8266-with-packages
          - esp32-hyphenated-name
          - esp32s3-complex
          - esp32-bluetooth-proxy
          - esp32c6-thread

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build client image
        run: docker build -t esphome-dist-client ha-addon/client/

      - name: Cache PlatformIO
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/esphome-compile-cache
          key: pio-${{ matrix.target }}-${{ matrix.esphome_version }}
          restore-keys: pio-${{ matrix.target }}-

      - name: Compile ${{ matrix.target }} on ESPHome ${{ matrix.esphome_version }}
        run: |
          docker run --rm \
            --entrypoint /bin/bash \
            -v "${{ github.workspace }}/tests/fixtures/compile_targets:/config" \
            -v /tmp/esphome-compile-cache:/esphome-versions \
            esphome-dist-client \
            -c "pip install --no-cache-dir 'esphome==${{ matrix.esphome_version }}' && esphome compile /config/${{ matrix.target }}.yaml"

  # Test the server Docker image (used by local worker)
  compile-server:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        esphome_version:
          - "2026.4.0"
          - "2026.7.0"
        # Test a subset on the server image — if client passes, server should too
        # Focus on the platforms that historically had issues (toolchain deps)
        target:
          - esp8266-arduino
          - esp32-idf
          - esp32s3-idf
          - esp32c3-idf

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build server image
        run: docker build -t esphome-dist-server ha-addon/

      - name: Cache PlatformIO
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/esphome-compile-cache
          key: pio-server-${{ matrix.target }}-${{ matrix.esphome_version }}
          restore-keys: pio-server-${{ matrix.target }}-

      - name: Compile ${{ matrix.target }} on ESPHome ${{ matrix.esphome_version }}
        run: |
          docker run --rm \
            --entrypoint /bin/bash \
            -v "${{ github.workspace }}/tests/fixtures/compile_targets:/config" \
            -v /tmp/esphome-compile-cache:/esphome-versions \
            esphome-dist-server \
            -c "pip install --no-cache-dir 'esphome==${{ matrix.esphome_version }}' && esphome compile /config/${{ matrix.target }}.yaml"
