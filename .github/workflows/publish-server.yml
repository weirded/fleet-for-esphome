name: Publish Server Docker Image

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "ha-addon/server/**"
      - "ha-addon/client/**"
      - "ha-addon/VERSION"
      - "ha-addon/Dockerfile.standalone"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/esphome-dist-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # E.10: required for cosign keyless signing via OIDC

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read version
        id: version
        run: echo "version=$(cat ha-addon/VERSION)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ha-addon
          file: ha-addon/Dockerfile.standalone
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # E.10: cosign keyless signing via GitHub OIDC. See publish-client.yml
      # for the rationale + verification command.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign published images with cosign
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          echo "${TAGS}" | xargs -I {} cosign sign --yes "{}@${DIGEST}"

      # SC.2: generate CycloneDX SBOM for the image we just pushed and
      # attach it as a cosign attestation. Verifies alongside the image
      # signature so downstream users can audit components without
      # trusting a separate artifact store.
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: esphome-dist-server-${{ steps.version.outputs.version }}.sbom.json
          artifact-name: esphome-dist-server-${{ steps.version.outputs.version }}.sbom.json

      - name: Attach SBOM as cosign attestation
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          cosign attest --yes \
            --predicate "esphome-dist-server-${VERSION}.sbom.json" \
            --type cyclonedx \
            "${IMAGE}@${DIGEST}"
