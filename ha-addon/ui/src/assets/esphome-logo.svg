<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2EA4FF"/>
      <stop offset="100%" stop-color="#1C7ED6"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bg)" />

  <!-- Grid (fleet / many devices) -->
  <g fill="white">
    <!-- Row 1 -->
    <rect x="272" y="272" width="120" height="120" rx="28"/>
    <rect x="452" y="272" width="120" height="120" rx="28"/>
    <rect x="632" y="272" width="120" height="120" rx="28"/>

    <!-- Row 2 -->
    <rect x="272" y="452" width="120" height="120" rx="28"/>
    <rect x="452" y="452" width="120" height="120" rx="28"/>
    <rect x="632" y="452" width="120" height="120" rx="28"/>

    <!-- Row 3 -->
    <rect x="272" y="632" width="120" height="120" rx="28"/>
    <rect x="452" y="632" width="120" height="120" rx="28"/>
    <rect x="632" y="632" width="120" height="120" rx="28"/>
  </g>

  <!-- Curved "aggregation / management" base -->
  <path d="M300 780 Q512 900 724 780" 
        stroke="white" 
        stroke-width="36" 
        fill="none" 
        stroke-linecap="round"/>
