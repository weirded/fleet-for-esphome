# #7: fully-qualify the image so Supervisor's build-config regex accepts it.
#   The regex `^([a-zA-Z\-\.:\d{}]+/)*?([\-\w{}]+)/([\-\w{}]+)(:[\.\-\w{}]+)?$`
#   requires at least one `/` in the path — `python:3.13-slim` alone doesn't
#   qualify, but `docker.io/library/python:3.13-slim` does. Same image.
#
# Bug #8: Supervisor emits a "build.yaml is deprecated, move params into the
# Dockerfile directly" WARNING on every addon-validation pass. We tried
# removing this file in dev.12 — that made Supervisor fall back to its own
# default base (ghcr.io/home-assistant/<arch>-base, which is Alpine/musl),
# and the build immediately failed because our Dockerfile uses `apt-get`
# (Debian/glibc) for gcc/libffi/libssl/git, which PlatformIO needs at
# runtime for its toolchains. Alpine-compatible fixes would mean either
# rewriting the Dockerfile against apk + recompiling every native
# dependency, or switching to a pre-built glibc image with a Supervisor
# `image:` key. Both are bigger changes than we want right now, so we're
# keeping build.yaml and eating the deprecation warning. Revisit when we
# have time for a full Alpine port or a prebuilt base strategy.
# SS.4: **server-side digest pin still blocked** by Supervisor's
# ``build.yaml`` schema regex.
# Confirmed on current Supervisor (2026-04 hass-4) by adding
# ``@sha256:…`` to both ``build_from`` entries and pushing — Supervisor
# SILENTLY rejected the build.yaml (didn't surface an "invalid
# schema" error), fell back to its default ``ghcr.io/home-assistant/
# <arch>-base`` (Alpine/musl), and the build then failed on the
# Dockerfile's ``apt-get install`` step (Alpine has no apt). Because
# the rejection is silent, the symptom is "Alpine fallback" rather
# than a validation error pointing at the pin.
#
# The worker Dockerfile (``ha-addon/client/Dockerfile``) pins by
# digest directly because there's no build.yaml to route through —
# that one is authoritative for the worker image's reproducibility.
# The server Dockerfile ARG default also carries the same digest so
# local ``docker build`` without Supervisor is reproducible.
# Supervisor-driven builds remain tag-only until HA accepts a
# ``build_from`` regex that allows ``@sha256:…``.
#
# Glibc requirement from Bug #8 still holds — do not remove this
# file in an attempt to "modernise" without a plan for Alpine
# compatibility.
build_from:
  aarch64: "docker.io/library/python:3.13-slim"
  amd64: "docker.io/library/python:3.13-slim"
