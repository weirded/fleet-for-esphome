{{- if and .Values.persistence.enabled (not .Values.autoscaling.enabled) -}}
{{- /*
  Static PVC only works for a single-replica fixed Deployment. When
  .Values.autoscaling.enabled is true, the Deployment uses a volumeClaimTemplate
  via a StatefulSet path is NOT used here — instead, each pod gets its own
  emptyDir or PVC declared inline. See deployment.yaml for the autoscaled path.

  Why: a Deployment cannot template per-replica PVCs. For a chart this small
  we keep things simple — fixed mode uses a shared PVC; autoscaled mode falls
  back to emptyDir unless you replace this with a StatefulSet.
*/}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "esphome-fleet-worker.fullname" . }}-versions
  labels:
    {{- include "esphome-fleet-worker.labels" . | nindent 4 }}
  {{- with .Values.persistence.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.persistence.size | quote }}
  {{- if .Values.persistence.storageClass }}
  {{- if eq .Values.persistence.storageClass "-" }}
  storageClassName: ""
  {{- else }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
  {{- end }}
{{- end -}}
