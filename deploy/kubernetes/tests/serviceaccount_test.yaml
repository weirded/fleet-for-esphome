suite: serviceaccount
templates:
  - templates/serviceaccount.yaml
release:
  name: fleet-worker
  namespace: esphome-fleet
tests:
  - it: creates a ServiceAccount by default
    set:
      server.url: http://example:8765
      server.token: tok
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: ServiceAccount
      - equal:
          path: metadata.name
          value: fleet-worker

  - it: skips ServiceAccount when serviceAccount.create is false
    set:
      server.url: http://example:8765
      server.token: tok
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: honors a custom serviceAccount.name
    set:
      server.url: http://example:8765
      server.token: tok
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa
