suite: secret
templates:
  - templates/secret.yaml
release:
  name: fleet-worker
  namespace: esphome-fleet
tests:
  - it: creates a Secret when token is provided
    set:
      server.url: http://example:8765
      server.token: tok
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: Secret
      - equal:
          path: metadata.name
          value: fleet-worker
      - equal:
          path: stringData.SERVER_TOKEN
          value: tok

  - it: skips the chart-managed Secret when existingSecret is set
    set:
      server.url: http://example:8765
      server.existingSecret: external-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: skips the chart-managed Secret when no token is provided
    set:
      server.url: http://example:8765
    asserts:
      - hasDocuments:
          count: 0
